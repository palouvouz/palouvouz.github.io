<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi2Esp3D AI Terminal</title>
    <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    body{
        background:#000;
        color:#00ff41;
        font-family:"Courier New", monospace;
        text-shadow:0 0 5px #00ff41,0 0 15px #00ff41;
        overflow:hidden;
    }
    #terminal{
        height:100vh;
        padding:20px;
        overflow-y:auto;
        white-space:pre-wrap;
    }
    .scanlines{
        position:fixed;
        inset:0;
        pointer-events:none;
        background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,.03),
            rgba(255,255,255,.03) 1px,
            transparent 2px,
            transparent 4px
        );
    }
    .glow{
        position:fixed;
        inset:0;
        pointer-events:none;
        background:
        radial-gradient(circle,transparent,rgba(0,0,0,.85));
    }
    .input-line{
        display:flex;
        gap:8px;
    }
    input{
        background:none;
        border:none;
        outline:none;
        color:#00ff41;
        font-family:inherit;
        font-size:18px;
        width:100%;
    }

    @keyframes blink{
        50%{
            opacity:0;
        }
    }

    </style>

    </head>

    <body>

    <div id="terminal"></div>

    <div class="scanlines"></div>
    <div class="glow"></div>


        <script>


            const terminal=document.getElementById("terminal");


            const API_KEY="AQ.Ab8RN6KwVnLICUpeDDfn4qCM_meG2XCpLpsFhOwue8-dhxHUVw";


            const SYSTEM_PROMPT=`

            You are Pi2Esp3D OS Terminal AI.

            You are the internal assistant running inside the Pi2Esp3D operating system.

            Pi2Esp3D is an open-source project that combines Raspberry Pi and ESP32-S3 technology to create a modern 3D printer control system.

            Hardware:

            - Raspberry Pi: Main processing unit.
            - ESP32-S3: Touchscreen controller.
            - Waveshare ESP32-S3 LCD 4.3 inch.
            - Resolution: 800x480.
            - WiFi communication.

            Printer:

            Main target:
            - Creality Ender 3 V2.

            Compatible systems:
            - OctoPrint.
            - Klipper.
            - Custom firmware.

            Features:

            - G-code management.
            - Printer monitoring.
            - Touch interface.
            - Web interface.
            - Remote control.
            - AI assistant.

            Terminal identity:

            root@pi2esp3d

            Rules:

            Answer like a Linux terminal.

            Use:
            [ OK ]
            [ INFO ]
            [ WARN ]
            [ ERROR ]

            Be technical and concise.

            Never mention Gemini.
            Never mention Google.
            Never say you are a language model.

            You are Pi2Esp3D system software.

            `;



            function sleep(ms){
                return new Promise(r=>setTimeout(r,ms));
            }


            function add(text){
                terminal.innerHTML+=text+"\n";
                terminal.scrollTop=terminal.scrollHeight;
            }


            async function typeText(text,speed=15){

                const line=document.createElement("div");
                terminal.appendChild(line);

                for(const c of text){

                    line.textContent+=c;

                    await sleep(speed);

                    terminal.scrollTop=terminal.scrollHeight;
                }
            }



            async function boot(){

            await typeText(`

██████╗ ██╗██████╗ ███████╗███████╗██████╗ ██████╗ ██████╗ 
██╔══██╗██║╚════██╗██╔════╝██╔════╝██╔══██╗╚════██╗██╔══██╗
██████╔╝██║ █████╔╝█████╗  ███████╗██████╔╝ █████╔╝██║  ██║
██╔═══╝ ██║██╔═══╝ ██╔══╝  ╚════██║██╔═══╝  ╚═══██╗██║  ██║
██║     ██║███████╗███████╗███████║██║     ██████╔╝██████╔╝
╚═╝     ╚═╝╚══════╝╚══════╝╚══════╝╚═╝     ╚═════╝ ╚═════╝
            `,5);


            add("Pi2Esp3D Bootloader v1.0");
            add("");


            const steps=[

            "Loading Kernel",
            "Initializing ESP32-S3",
            "Connecting Raspberry Pi",
            "Starting Touch Interface",
            "Loading Network Service",
            "Starting AI Engine",
            "Checking Printer Interface"

            ];


            for(const step of steps){

            let line=document.createElement("div");
            terminal.appendChild(line);


            for(let i=1;i<=3;i++){

            line.textContent=
            step+".".repeat(i);

            await sleep(250);

            }


            line.textContent="[ OK ] "+step;

            }


            add("");

            await typeText("[ OK ] System Ready.");

            await sleep(500);

            add("");

            await typeText("AI Terminal Online.");

            add("");

            createPrompt();

            }



            function createPrompt(){


            const box=document.createElement("div");

            box.className="input-line";


            box.innerHTML=`

            <span>root@pi2esp3d:~$</span>
            <input autofocus>

            `;


            terminal.appendChild(box);


            const input=box.querySelector("input");

            input.focus();



            input.onkeydown=async(e)=>{


            if(e.key!=="Enter")return;


            const command=input.value.trim();

            input.disabled=true;


            // κρατάει την εντολή στο terminal
            const oldCommand=document.createElement("div");

            oldCommand.textContent=
            "root@pi2esp3d:~$ " + command;


            // αντικαθιστά το input με απλό κείμενο
            box.replaceWith(oldCommand);


            add("");



            if(command==="clear"){

            terminal.innerHTML="";

            createPrompt();

            return;

            }



            if(command==="help"){

            await typeText("[ INFO ] Available commands:");
            await typeText("help");
            await typeText("about");
            await typeText("clear");

            createPrompt();

            return;

            }



            if(command==="about"){

            await typeText("Pi2Esp3D - ESP32-S3 + Raspberry Pi 3D Printer AI Interface.");

            createPrompt();

            return;

            }



            const thinking=document.createElement("div");

            terminal.appendChild(thinking);


            let dots=0;


            const animation=setInterval(()=>{

            dots++;

            if(dots>3)dots=1;

            thinking.textContent=
            "[ AI ] Processing"+ ".".repeat(dots);

            },350);



            try{


            const response=await fetch(

            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,

            {

            method:"POST",

            headers:{
            "Content-Type":"application/json"
            },

            body:JSON.stringify({

            contents:[

            {

            parts:[

            {

            text:SYSTEM_PROMPT+
            "\n\nUSER COMMAND:\n"+
            command

            }

            ]

            }

            ]

            })

            }

            );



            const data=await response.json();


            clearInterval(animation);

            thinking.remove();


            const answer=
            data?.candidates?.[0]?.content?.parts?.[0]?.text
            ||
            "[ ERROR ] No response received.";


            add("");

            await typeText(answer,10);


            }

            catch(error){

            clearInterval(animation);

            thinking.remove();

            await typeText(
            "[ ERROR ] AI connection failed."
            );

            }


            add("");

            createPrompt();

            };


            }


            boot();


        </script>

    </body>
</html>
