<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palouvouz | Engineering Tools Hub</title>

    <link rel="stylesheet" href="tools.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
    <h1>Engineering Tools Hub</h1>
    <p>Math • Physics • Finance • Robotics utilities</p>
</header>

<input type="text" id="searchBar" placeholder="Αναζήτηση εργαλείων..." onkeyup="filterTools()">

<section class="tools-grid" id="toolsGrid">

    <!-- BASIC CALCULATOR -->
    <div class="tool-card">
        <h3>Βασικές Πράξεις</h3>

        <div class="input-group">
            <input type="number" id="baseA">
            <input type="number" id="baseB">
        </div>

        <div class="btn-grid">
            <button onclick="basic('+')">+</button>
            <button onclick="basic('-')">-</button>
            <button onclick="basic('*')">×</button>
            <button onclick="basic('/')">÷</button>
        </div>

        <div class="result" id="resBasic">0</div>
    </div>

    <!-- PYTHAGORAS -->
    <div class="tool-card">
        <h3>Πυθαγόρειο Θεώρημα</h3>

        <input type="number" id="a" placeholder="a">
        <input type="number" id="b" placeholder="b">

        <button onclick="pythagoras()">Υπολογισμός</button>

        <div class="result" id="resPyth">0</div>
    </div>

    <!-- QUADRATIC -->
    <div class="tool-card">
        <h3>Δευτεροβάθμια Εξίσωση</h3>

        <input type="number" id="qa">
        <input type="number" id="qb">
        <input type="number" id="qc">

        <button onclick="quadratic()">Λύση</button>

        <div class="result" id="resQuad">x1 / x2</div>
    </div>

    <!-- TRIG -->
    <div class="tool-card">
        <h3>Τριγωνομετρία</h3>

        <input type="number" id="angle" placeholder="μοίρες">

        <div class="btn-grid">
            <button onclick="trig('sin')">sin</button>
            <button onclick="trig('cos')">cos</button>
            <button onclick="trig('tan')">tan</button>
        </div>

        <div class="result" id="resTrig">0</div>
    </div>

    <!-- AVERAGE -->
    <div class="tool-card">
        <h3>Μέσος Όρος</h3>

        <input type="text" id="avgInput" placeholder="π.χ 10,20,30">

        <button onclick="average()">Υπολογισμός</button>

        <div class="result" id="resAvg">0</div>
    </div>

    <!-- CIRCLE -->
    <div class="tool-card">
        <h3>Εμβαδόν Κύκλου</h3>

        <input type="number" id="r">

        <button onclick="circle()">Υπολογισμός</button>

        <div class="result" id="resCircle">0</div>
    </div>

    <!-- CONVERTER -->
    <div class="tool-card full">
        <h3>Currency Converter</h3>

        <input type="number" id="amount">

        <select id="from">
            <option>EUR</option>
            <option>USD</option>
            <option>GBP</option>
        </select>

        <select id="to">
            <option>USD</option>
            <option>EUR</option>
            <option>BTC</option>
        </select>

        <button onclick="convert()">Convert</button>

        <div class="result" id="resConvert">--</div>
    </div>

</section>

<button class="calc-btn" onclick="toggleCalc()">🧮</button>

<div id="calc">
    <div id="screen">0</div>

    <div class="grid">
        <button onclick="c('7')">7</button>
        <button onclick="c('8')">8</button>
        <button onclick="c('9')">9</button>
        <button onclick="c('+')">+</button>

        <button onclick="c('4')">4</button>
        <button onclick="c('5')">5</button>
        <button onclick="c('6')">6</button>
        <button onclick="c('-')">-</button>

        <button onclick="c('1')">1</button>
        <button onclick="c('2')">2</button>
        <button onclick="c('3')">3</button>
        <button onclick="c('*')">*</button>

        <button onclick="c('0')">0</button>
        <button onclick="calc()">=</button>
        <button onclick="clearCalc()">C</button>
        <button onclick="c('/')">/</button>
    </div>
</div>

<script src="tools.js"></script>

</body>
</html>
