<!DOCTYPE html>

<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Η Τρύπα του Όζοντος - Πανταζής Λούκας Βουζαξάκης</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f2439;
            --accent-cyan: #00d2ff;
            --text-white: #ffffff;
            --header-footer-bg: rgba(15, 36, 57, 0.95);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: var(--bg-dark);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            color: var(--text-white);
        }

        /* --- LOADING SCREEN STYLE --- */
        #loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1), opacity 0.8s ease;
            position: absolute;
            width: 100%;
            z-index: 20;
            background: radial-gradient(circle at center, #1a3a5a 0%, #0f2439 100%);
        }

        .box {
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 210, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 85%;
            position: relative;
        }

        .loader {
            margin: 25px auto;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 210, 255, 0.1);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
            transition: width 1s linear;
        }

        /* --- IFRAME CONTAINER STYLE --- */
        #content-screen {
            opacity: 0;
            visibility: hidden;
            height: 100vh;
            width: 100%;
            transition: opacity 1s ease;
            display: flex;
            flex-direction: column;
        }

        /* Header & Footer για το Iframe Screen */
        .info-bar {
            background: var(--header-footer-bg);
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            z-index: 10;
        }

        .fullscreen-btn {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: var(--accent-cyan);
            color: var(--bg-dark);
        }

        .footer-bar {
            background: var(--header-footer-bg);
            padding: 10px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-top: 1px solid rgba(0, 210, 255, 0.3);
            font-size: 0.85rem;
            color: var(--text-white);
            z-index: 10;
            gap: 4px;
        }

        .powered-by {
            font-weight: 700;
            color: var(--accent-cyan);
            letter-spacing: 1px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .info-title {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .info-author {
            font-weight: 400;
            color: var(--accent-cyan);
            font-size: 0.9rem;
        }

        .iframe-container {
            flex-grow: 1;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .status-text {
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--accent-cyan);
            margin-top: 15px;
        }

        /* Η Γη στο background του loading */
        .bg-earth {
            position: absolute;
            bottom: -150px;
            right: -150px;
            width: 400px;
            height: 400px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/The_Earth_seen_from_Apollo_17.jpg/600px-The_Earth_seen_from_Apollo_17.jpg') no-repeat center;
            background-size: cover;
            border-radius: 50%;
            opacity: 0.2;
            z-index: -1;
        }
    </style>
    <script>
        let timeLeft = 5;
        const targetURL = "https://www.canva.com/design/DAHJectK2rs/S40EmMG49Lvfcn3T5DzUJQ/view?embed";

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function startSequence() {
            const countdownText = document.getElementById("countdown");
            const progressBar = document.querySelector(".progress-bar");
            const loadingScreen = document.getElementById("loading-screen");
            const contentScreen = document.getElementById("content-screen");

            const timer = setInterval(() => {
                if (timeLeft > 0) {
                    countdownText.textContent = `Προετοιμασία παρουσίασης σε ${timeLeft}...`;
                    progressBar.style.width = `${(6 - timeLeft) * 20}%`;
                } else {
                    countdownText.textContent = "Έτοιμο!";
                    progressBar.style.width = "100%";
                    clearInterval(timer);
                    
                    // Εφέ μετάβασης
                    setTimeout(() => {
                        loadingScreen.style.opacity = "0";
                        loadingScreen.style.transform = "scale(1.1)";
                        
                        setTimeout(() => {
                            loadingScreen.style.display = "none";
                            contentScreen.style.visibility = "visible";
                            contentScreen.style.opacity = "1";
                        }, 800);
                    }, 500);
                }
                timeLeft--;
            }, 1000);
        }

        window.onload = startSequence;
    </script>
</head>
<body>

    <!-- ΟΘΟΝΗ ΦΟΡΤΩΣΗΣ (Loading Screen) -->
    <div id="loading-screen">
        <div class="bg-earth"></div>
        <div class="box">
            <p style="font-size: 0.8rem; text-transform: uppercase; color: var(--accent-cyan); letter-spacing: 2px; margin-bottom: 5px;">Εργασία Χημείας Γ' Γυμνασίου</p>
            <h2 style="margin-top:0; margin-bottom: 10px;">Η ΤΡΥΠΑ ΤΟΥ ΟΖΟΝΤΟΣ</h2>
            <p style="opacity:0.9; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; margin-bottom: 5px;">Πανταζής Λούκας Βουζαξάκης</p>
            <p class="powered-by" style="margin-bottom: 15px;">Powered by palouvouz</p>
            
            <div class="loader"></div>
            
            <p id="countdown" class="status-text">Προετοιμασία παρουσίασης σε 5...</p>
            
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            
            <p style="font-size: 0.8rem; opacity: 0.6;">3ο Γυμνάσιο Ηρακλείου Κρήτης</p>
        </div>
    </div>

    <!-- Η ΠΑΡΟΥΣΙΑΣΗ (Iframe Screen) -->
    <div id="content-screen">
        <!-- ΕΠΑΝΩ ΜΠΑΡΑ ΠΛΗΡΟΦΟΡΙΩΝ -->
        <header class="info-bar">
            <div class="info-title">Η Τρύπα του Όζοντος</div>
            <div class="info-author">Πανταζής Λούκας Βουζαξάκης</div>
            <button class="fullscreen-btn" onclick="toggleFullScreen()">Full Screen</button>
        </header>

        <!-- ΤΟ IFRAME -->
        <div class="iframe-container">
            <iframe 
                src="https://www.canva.com/design/DAHJectK2rs/S40EmMG49Lvfcn3T5DzUJQ/view?embed" 
                allowfullscreen="allowfullscreen" 
                allow="fullscreen">
            </iframe>
        </div>

        <!-- ΚΑΤΩ ΜΠΑΡΑ -->
        <footer class="footer-bar">
            <div>3ο Γυμνάσιο Ηρακλείου Κρήτης | Χημεία Γ' Γυμνασίου</div>
            <div class="powered-by">Powered by palouvouz</div>
        </footer>
    </div>

</body>
</html>
