<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Exhibition C1</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Base Styles --- */
        :root {
            --bg-color: #050505;
            --card-bg: #0f0f0f;
            --text-main: #fff;
            --text-muted: #888;
            --primary: #fff;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 40px 15px; 
            text-align: center;
        }

        .container { max-width: 1400px; margin: 0 auto; min-height: 60vh; }
        
        h1 { 
            font-weight: 200; 
            letter-spacing: 8px; 
            text-transform: uppercase; 
            margin-bottom: 40px; 
            font-size: clamp(1.5rem, 4vw, 2.5rem);
        }

        /* --- Loader --- */
        .loader {
            border: 4px solid #222;
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 50px auto;
            display: none;
        }
        .loader.active { display: block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- Gallery Grid --- */
        .pswp-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
            opacity: 0; 
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .pswp-gallery.loaded { opacity: 1; transform: translateY(0); }

        .gallery-item {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 8px;
            overflow: hidden;
            text-decoration: none;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: zoom-in;
            position: relative;
        }

        .gallery-item:hover { 
            transform: translateY(-5px); 
            border-color: #555; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        
        .gallery-item img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            display: block; 
            background: #111;
        }

        /* --- Captions on Grid --- */
        .caption-box {
            padding: 15px;
            text-align: left;
            border-top: 1px solid #1a1a1a;
            flex-grow: 1;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .description { font-size: 0.95rem; color: #e0e0e0; margin-bottom: 8px; line-height: 1.4; font-weight: 500;}
        .credits { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* --- PhotoSwipe Custom Caption --- */
        .pswp__custom-caption {
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0));
            padding: 20px 15px 30px; /* Extra padding bottom for mobile bars */
            font-size: 16px;
            color: #fff;
            width: 100%;
            position: absolute;
            bottom: 0;
            left: 0;
            text-align: center;
            pointer-events: none; /* Let clicks pass through */
        }
        .pswp__custom-caption strong { display: block; margin-bottom: 4px; font-size: 1.1em; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .pswp__custom-caption span { text-shadow: 0 1px 2px rgba(0,0,0,0.8); }

        /* --- Footer/Status --- */
        .status-box {
            margin-top: 20px;
            color: #555;
            font-size: 0.9rem;
            min-height: 20px;
        }
        
        .footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid #222;
        }

        .footer-note {
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .footer-contact {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .footer-link {
            color: var(--text-muted);
            text-decoration: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .footer-link:hover { color: var(--primary); }

        @media (max-width: 768px) {
            .container { padding: 40px 15px; }
            .footer-contact { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Picture Exhibition C1</h1>
        
        <div id="loader" class="loader"></div>

        <div class="pswp-gallery" id="my-gallery">
            </div>

        <div id="status-msg" class="status-box"></div>
    </div>

    <footer class="footer">
        <div class="footer-note">powered by palouvouz</div>
        <div class="footer-contact">
            <a href="mailto:palouvouz@gmail.com" class="footer-link">
                <i class="fa-solid fa-envelope"></i> palouvouz@gmail.com
            </a>
            <a href="https://www.instagram.com/palouvouz" target="_blank" class="footer-link">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>
            <a href="https://github.com/pantzos11" target="_blank" class="footer-link">
                <i class="fa-brands fa-github"></i> GitHub
            </a>
            <a href="tel:6945193420" class="footer-link">
                <i class="fa-solid fa-phone"></i> 6945193420
            </a>
        </div>
        <p style="opacity: 0.4; font-size: 0.8rem;">© 2026 Palouvouz</p>
    </footer>

<script type="module">
    import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';
    import PhotoSwipe from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.esm.min.js';

    const config = {
        imgFolder: "images", 
        csvPath: "text/index.csv",
        totalPossible: 27
    };

    async function init() {
        const gallery = document.getElementById('my-gallery');
        const status = document.getElementById('status-msg');
        const loader = document.getElementById('loader');

        loader.classList.add('active');
        status.textContent = "Loading gallery data...";
        
        try {
            // Fetch CSV Data
            let csvData = [];
            try {
                const response = await fetch(config.csvPath);
                if (response.ok) {
                    const rawCsvData = await response.text();
                    csvData = parseCSV(rawCsvData);
                } else {
                    console.warn(`CSV missing at ${config.csvPath}, using defaults.`);
                }
            } catch (err) {
                console.warn("Error fetching CSV, continuing without captions.", err);
            }

            // Create promises for images
            const imagePromises = [];
            for (let i = 1; i <= config.totalPossible; i++) {
                // Pad ID: 1 -> "01", 10 -> "10"
                const id = i < 10 ? '0' + i : i;
                const url = `${config.imgFolder}/${id}.jpg`;
                imagePromises.push(processImage(url, i, csvData));
            }

            // Wait for all images to check dimensions (with timeout protection)
            const results = await Promise.all(imagePromises);
            const validItems = results.filter(item => item !== null);

            if (validItems.length === 0) {
                status.innerHTML = "No images found. Please check the 'images' folder.";
                loader.classList.remove('active');
                return;
            }

            // Render Gallery
            gallery.innerHTML = '';
            validItems.forEach(item => gallery.appendChild(item.element));
            
            // Animation frame for smooth entry
            requestAnimationFrame(() => {
                gallery.classList.add('loaded');
            });

            status.innerHTML = `Displaying ${validItems.length} works. Max: 29`;

            initLightbox();

        } catch (e) {
            console.error("Initialization Error:", e);
            status.innerHTML = `<span style="color:#d9534f">Error: ${e.message}</span>`;
        } finally {
            loader.classList.remove('active');
        }
    }

    // Improved CSV Parser that handles quotes properly
    function parseCSV(text) {
        if (!text) return [];
        const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
        
        return lines.map(line => {
            // Split by comma, but ignore commas inside double quotes
            const matches = [];
            let current = '';
            let inQuote = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuote = !inQuote;
                } else if (char === ',' && !inQuote) {
                    matches.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            matches.push(current.trim()); // Push last field

            // Clean quotes from the results
            const cleanMatches = matches.map(m => m.replace(/^"|"$/g, '').trim());

            return { 
                desc: cleanMatches[0] || "Untitled", 
                author: cleanMatches[1] || "Unknown" 
            };
        });
    }

    async function processImage(url, index, csvData) {
        // We must know dimensions for PhotoSwipe. 
        // This function loads the image to get them.
        const dimensions = await getImageDimensions(url);
        
        if (!dimensions) return null; // Image doesn't exist

        // Match CSV row (index-1 because array is 0-indexed)
        const data = csvData[index - 1] || { desc: `Artwork #${index}`, author: "Unknown" };

        const card = document.createElement('a');
        card.href = url;
        card.className = 'gallery-item';
        card.setAttribute('data-pswp-width', dimensions.width); 
        card.setAttribute('data-pswp-height', dimensions.height);
        // Store data attributes safely
        card.setAttribute('data-title', data.desc);
        card.setAttribute('data-author', data.author);
        card.target = '_blank';

        card.innerHTML = `
            <img src="${url}" alt="${data.desc}" loading="lazy">
            <div class="caption-box">
                <div class="description">${data.desc}</div>
                <div class="credits">By ${data.author}</div>
            </div>
        `;
        return { element: card, index: index };
    }

    function getImageDimensions(url) {
        return new Promise(resolve => {
            const img = new Image();
            // Set a timeout to avoid hanging forever if image is corrupt
            const timeout = setTimeout(() => resolve(null), 5000);

            img.onload = () => {
                clearTimeout(timeout);
                resolve({ width: img.naturalWidth, height: img.naturalHeight });
            };
            img.onerror = () => {
                clearTimeout(timeout);
                resolve(null);
            };
            img.src = url;
        });
    }

    function initLightbox() {
        const lightbox = new PhotoSwipeLightbox({
            gallery: '#my-gallery',
            children: 'a',
            pswpModule: PhotoSwipe,
            paddingFn: (viewportSize) => {
                return {
                    top: 0, bottom: 0, left: 0, right: 0
                }
            }
        });

        lightbox.on('uiRegister', function() {
            lightbox.pswp.ui.registerElement({
                name: 'custom-caption',
                order: 9,
                isButton: false,
                appendTo: 'root',
                html: '',
                onInit: (el, pswp) => {
                    lightbox.pswp.on('change', () => {
                        const currSlide = lightbox.pswp.currSlide;
                        if (!currSlide || !currSlide.data || !currSlide.data.element) return;

                        const currSlideElement = currSlide.data.element;
                        const title = currSlideElement.getAttribute('data-title');
                        const author = currSlideElement.getAttribute('data-author');
                        
                        let captionHTML = '';
                        if(title) {
                            captionHTML = `<strong>${title}</strong><span style="opacity:0.8; font-size:0.9em">Photo by ${author}</span>`;
                        }
                        
                        el.innerHTML = captionHTML ? `<div class="pswp__custom-caption">${captionHTML}</div>` : '';
                    });
                }
            });
        });

        lightbox.init();
    }

    init();
</script>

</body>
</html>
